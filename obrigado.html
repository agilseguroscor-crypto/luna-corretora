<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<title>Obrigado! | Luna Seguros</title>
<meta name="description" content="Recebemos sua solicitação de cotação. Em breve entraremos em contato."/>
<meta name="robots" content="noindex,nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--purple:#7b0b9a;--purple-d:#5c0873;--purple-l:#f3e6f8;--grafite:#282828;--text:#444;--muted:#6b7280;--border:#e0e0e0;--bg:#f7f7f7;--green:#27ae60;--fh:'Nunito',sans-serif;--fb:'Nunito Sans',sans-serif;--max:1200px;--px:clamp(1rem,4vw,5rem)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--fb);color:var(--text);background:#fff;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
.w{max-width:var(--max);margin:0 auto;padding:0 var(--px)}
.hdr{background:rgba(22,22,22,.97);backdrop-filter:blur(12px);position:sticky;top:0;z-index:200;border-bottom:1px solid rgba(255,255,255,.07)}
.nav{display:flex;align-items:center;height:68px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-mark{background:linear-gradient(135deg,var(--purple),#a020c8);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;box-shadow:0 2px 10px rgba(123,11,154,.4)}
.logo-text{font-family:var(--fh);font-weight:900;font-size:1.15rem;color:#fff;letter-spacing:-.02em}
.logo-text em{color:#c97fe0;font-style:normal}
.ty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:80px var(--px)}
.ty-box{max-width:520px}
.ty-ico{font-size:4rem;margin-bottom:20px;display:block}
.ty-box h1{font-family:var(--fh);font-size:clamp(1.8rem,3.5vw,2.5rem);font-weight:900;color:var(--grafite);margin-bottom:12px}
.ty-box p{font-size:1.05rem;color:var(--muted);margin-bottom:28px;line-height:1.7}
.ty-box .highlight{color:var(--purple);font-weight:700}
.ty-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn-purple{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:var(--purple);color:#fff;font-family:var(--fh);font-size:.95rem;font-weight:800;border-radius:10px;transition:all .2s}
.btn-purple:hover{background:var(--purple-d);transform:translateY(-2px)}
.btn-wa{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:#1aad4b;color:#fff;font-family:var(--fh);font-size:.95rem;font-weight:800;border-radius:10px;transition:all .2s}
.btn-wa:hover{background:#158f3e;transform:translateY(-2px)}
.ftr{background:var(--grafite);color:rgba(255,255,255,.55);padding:32px 0;font-size:.82rem;text-align:center}
</style>
</head>
<body>
<header class="hdr"><div class="w"><nav class="nav"><a href="/" class="logo"><div class="logo-mark"><img src="/cat-logo.svg" alt="Luna" width="24" height="24" style="display:block"></div><div class="logo-text">Luna <em>Seguros</em></div></a></nav></div></header>

<main class="ty">
  <div class="ty-box">
    <span class="ty-ico">✅</span>
    <h1>Recebemos sua cotação!</h1>
    <p>Nossa equipe já está analisando seus dados. Entraremos em contato pelo <span class="highlight">WhatsApp</span> em até <span class="highlight">5 minutos</span> durante o horário comercial.</p>
    <div class="ty-actions">
      <a href="/" class="btn-purple">Voltar ao início</a>
      <a href="https://wa.me/552141421987?text=Ol%C3%A1!%20Acabei%20de%20enviar%20uma%20cota%C3%A7%C3%A3o%20pelo%20site." target="_blank" class="btn-wa">💬 Falar no WhatsApp</a>
    </div>
  </div>
</main>

<footer class="ftr">
  <div class="w">
    <p>© 2025 Luna Seguros Corretora — SUSEP 202021257</p>
  </div>
</footer>
</body>
</html>
